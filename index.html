<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALACTIC ARCHITECT | MISSION CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #FF4D00; --glow: rgba(255, 77, 0, 0.8); }
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .heavy { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; line-height: 0.9; }
        .section-frame { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; }
        .line-input { background: transparent; border: none; border-bottom: 3px solid rgba(255, 255, 255, 0.4); font-family: 'Archivo Black'; font-size: clamp(1.5rem, 5vw, 3rem); width: 80%; text-align: center; outline: none; color: white; margin-bottom: 2rem; }
        .line-input:focus { border-bottom-color: var(--orange); }
        #launchOverlay { position: fixed; inset: 0; background: #000; z-index: 200; display: none; align-items: center; justify-content: center; }
        #starlinkVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        #cdText { position: relative; z-index: 210; font-size: 15vw; }
        .btn-launch { background: var(--orange); padding: 2rem 5rem; font-family: 'Archivo Black'; font-size: 2rem; color: white; border: none; cursor: pointer; box-shadow: 0 0 30px var(--glow); }
    </style>
</head>
<body>

    <form id="architectForm">
        <section class="section-frame">
            <h1 class="heavy text-orange-600 text-xs tracking-[0.8em] mb-4">Commander & Portal</h1>
            <input type="email" id="commander_email" class="line-input" placeholder="EMAIL" required>
            <input type="text" id="subdomain" class="line-input" placeholder="PORTAL SUBDOMAIN" required>
        </section>

        <section class="section-frame">
            <h1 class="heavy text-orange-600 text-xs tracking-[0.8em] mb-4">API Credentials</h1>
            <input type="text" id="api_user" class="line-input" placeholder="API KEY" required>
            <input type="password" id="api_pass" class="line-input" placeholder="API SECRET" required>
        </section>

        <section class="section-frame">
            <h1 class="heavy text-orange-600 text-xs tracking-[0.8em] mb-4">Manifest</h1>
            <input type="text" id="courses" class="line-input" placeholder="COURSE NAME" required>
            <input type="text" id="groups" class="line-input" placeholder="GROUP NAME" required>
        </section>

        <section class="section-frame">
            <button type="submit" class="btn-launch heavy">INITIATE LAUNCH</button>
        </section>
    </form>

    <div id="launchOverlay">
        <video id="starlinkVideo" playsinline muted><source src="Starlink launch.mp4" type="video/mp4"></video>
        <h1 id="cdText" class="heavy italic">5</h1>
        <div id="successMsg" class="hidden absolute z-[220] inset-0 bg-black/80 flex flex-col items-center justify-center">
            <h1 class="heavy text-6xl">ORBIT ACHIEVED</h1>
            <p class="mt-4">CHECK YOUR EMAIL & LOGS</p>
            <button onclick="location.reload()" class="mt-8 border p-4">RESTART</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/a/macros/learnupon.com/s/AKfycby4QKQtoN1lLBxHL4K6Dks9cIhLwVNjz2iPL15Dl_jz5j3hpgCAqqA4ym0s9fKnBHOI2Q/exec';

        document.getElementById('architectForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const payload = {
                commander: document.getElementById('commander_email').value,
                subdomain: document.getElementById('subdomain').value,
                username: document.getElementById('api_user').value,
                password: document.getElementById('api_pass').value,
                courses: document.getElementById('courses').value,
                groups: document.getElementById('groups').value
            };

            document.getElementById('launchOverlay').style.display = 'flex';
            const vid = document.getElementById('starlinkVideo');
            vid.currentTime = 25;
            vid.play();

            // Send to Google Apps Script
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log("Payload transmitted to Mission Control.");
            }).catch(err => {
                alert("Launch Malfunction: Check Console");
                console.error(err);
            });

            let count = 5;
            const timer = setInterval(() => {
                count--;
                document.getElementById('cdText').innerText = count > 0 ? count : "IGNITION";
                if(count <= 0) {
                    clearInterval(timer);
                    setTimeout(() => {
                        document.getElementById('successMsg').classList.remove('hidden');
                    }, 2000);
                }
            }, 1000);
        };
    </script>
</body>
</html>
