<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnUpon Sandbox Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass max-w-lg w-full rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Sandbox Builder</h1>
            <p class="text-gray-500 mt-2">Automate your LearnUpon demo environments in seconds.</p>
        </div>

        <form id="launcherForm" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">API Key (User)</label>
                    <input type="text" id="apiKey" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="Username" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">API Password</label>
                    <input type="password" id="apiPass" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="••••••••" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Portal Subdomain</label>
                <div class="flex">
                    <input type="text" id="subdomain" class="w-full p-3 border border-gray-200 rounded-l-lg focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="your-portal" required>
                    <span class="inline-flex items-center px-3 rounded-r-lg border border-l-0 border-gray-200 bg-gray-50 text-gray-500 text-sm">.learnupon.com</span>
                </div>
            </div>

            <hr class="border-gray-100">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Learner Email</label>
                <input type="email" id="email" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition" placeholder="prospect@company.com" required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Assign Course</label>
                <select id="courseId" class="w-full p-3 border border-gray-200 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 outline-none transition" required>
                    <option value="">Fetching courses...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Scheduled Demo Date</label>
                <input type="datetime-local" id="liveDate" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95">
                Generate Sandbox
            </button>
        </form>

        <div id="status" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        const GAS_URL = "YOUR_DEPLOYED_WEB_APP_URL"; 

        // Fetch courses on load
        window.onload = async () => {
            try {
                const response = await fetch(GAS_URL);
                const courses = await response.json();
                const select = document.getElementById('courseId');
                select.innerHTML = '<option value="">-- Select Course --</option>';
                courses.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.innerHTML = c.name;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error("Course fetch failed");
            }
        };

        document.getElementById('launcherForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">Building Portal...</span>`;
            status.classList.remove('hidden', 'text-red-500', 'text-green-600');
            status.classList.add('text-purple-600');
            status.innerText = "Talking to LearnUpon APIs...";

            const payload = {
                apiKey: document.getElementById('apiKey').value,
                apiPass: document.getElementById('apiPass').value,
                subdomain: document.getElementById('subdomain').value,
                email: document.getElementById('email').value,
                courseId: document.getElementById('courseId').value,
                liveLearningDate: document.getElementById('liveDate').value
            };

            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                status.innerText = "✅ Sandbox Ready! Notification sent.";
                status.classList.replace('text-purple-600', 'text-green-600');
                btn.innerHTML = "Success!";
            } catch (err) {
                status.innerText = "❌ Error occurred. Check GAS logs.";
                status.classList.replace('text-purple-600', 'text-red-500');
                btn.innerHTML = "Try Again";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
