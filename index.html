<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO PORTAL LAUNCH | ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #FF4D00; --bg: #0F0F0F; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .heavy { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; line-height: 0.9; }
        
        /* Central Logo Unit */
        .logo-anchor {
            filter: drop-shadow(0 0 25px rgba(255, 77, 0, 0.6));
            transition: all 0.5s ease;
        }

        /* Video Layering */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; object-fit: cover; opacity: 0.5;
        }
        
        /* Rose Island Style Sections */
        .section-frame {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .line-input {
            background: transparent; border: none; border-bottom: 5px solid white;
            font-family: 'Archivo Black', sans-serif; font-size: clamp(2rem, 6vw, 5rem);
            width: 80%; text-align: center; outline: none; transition: 0.4s;
            text-transform: uppercase; color: white;
        }
        .line-input:focus { border-bottom-color: var(--orange); transform: scale(1.05); }
        .line-input::placeholder { color: rgba(255,255,255,0.1); }

        .btn-launch {
            background: var(--orange);
            color: white;
            padding: 2rem 4rem;
            font-family: 'Archivo Black', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.2em;
            transition: all 0.3s;
            box-shadow: 0 0 50px rgba(255, 77, 0, 0.4);
        }
        .btn-launch:hover { background: white; color: var(--orange); transform: scale(1.1); }

    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="videoplayback.mp4" type="video/mp4">
    </video>

    <header class="fixed top-12 left-0 w-full flex flex-col items-center z-50">
        <div class="logo-anchor flex flex-col items-center">
            <img src="logo.jpeg" class="h-16 w-auto mb-4 invert brightness-200">
            <h2 class="text-white font-black tracking-[1.2em] uppercase text-[10px] sm:text-xs">
                Demo Portal Launch
            </h2>
        </div>
    </header>

    <form id="architectForm">
        <section class="section-frame">
            <h1 class="heavy text-orange-600 text-sm tracking-[0.5em] mb-6">Step 01 / Target Subdomain</h1>
            <input type="text" id="subdomain" class="line-input" placeholder="PORTAL NAME" required>
        </section>

        <section class="section-frame bg-white/90 backdrop-blur-md">
            <h1 class="heavy text-black text-sm tracking-[0.5em] mb-6">Step 02 / Secure Keys</h1>
            <div class="w-full flex flex-col items-center gap-12">
                <input type="text" id="apiKey" class="line-input !border-black !text-black" placeholder="API KEY" required>
                <input type="password" id="apiPass" class="line-input !border-black !text-black" placeholder="API PASSWORD" required>
            </div>
        </section>

        <section class="section-frame">
            <h1 class="heavy text-orange-600 text-sm tracking-[0.5em] mb-6">Step 03 / Load Manifest</h1>
            <div class="w-full flex flex-col items-center gap-12">
                <input type="text" id="courseList" class="line-input" placeholder="COURSES (COMMA SEPARATED)" required>
                <input type="text" id="groupList" class="line-input" placeholder="GROUPS (COMMA SEPARATED)" required>
            </div>
        </section>

        <section class="section-frame bg-orange-600">
            <h1 class="heavy text-white text-3xl mb-12 italic">All systems go.</h1>
            <input type="datetime-local" id="liveDate" class="line-input !border-white mb-20 !text-2xl">
            
            <button type="submit" id="submitBtn" class="btn-launch">
                INITIATE LAUNCH
            </button>
            <p id="status" class="mt-8 font-black uppercase text-xs tracking-widest text-black animate-pulse"></p>
        </section>
    </form>

    <script>
        const GAS_URL = "YOUR_GOOGLE_SCRIPT_URL";

        document.getElementById('architectForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.innerText = "IGNITION...";
            status.innerText = "COORDINATING WITH LEARNUPON API...";

            const payload = {
                subdomain: document.getElementById('subdomain').value,
                apiKey: document.getElementById('apiKey').value,
                apiPass: document.getElementById('apiPass').value,
                courses: document.getElementById('courseList').value.split(','),
                groups: document.getElementById('groupList').value.split(','),
                liveDate: document.getElementById('liveDate').value
            };

            try {
                // Sending to Google Apps Script
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                status.innerText = "ORBIT ACHIEVED. PORTAL IS LIVE.";
                btn.innerText = "LAUNCH COMPLETE";
                btn.style.background = "black";
            } catch (err) {
                status.innerText = "LAUNCH ABORTED. CHECK CONNECTION.";
                btn.innerText = "RETRY IGNITION";
            }
        };
    </script>
</body>
</html>
