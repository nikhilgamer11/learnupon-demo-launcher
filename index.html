<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Launcher Form</title>
    <script>
        function submitForm(event) {
            event.preventDefault();
            const courseName = document.getElementById('courseName').value;
            const learnerEmail = document.getElementById('learnerEmail').value;

            // Basic validation
            if (!courseName || !learnerEmail) {
                alert('Please fill in all fields.');
                return;
            }

            // Regex for email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(learnerEmail)) {
                alert('Please enter a valid email address.');
                return;
            }

            // Preparing data to send
            const formData = new FormData();
            formData.append('courseName', courseName);
            formData.append('learnerEmail', learnerEmail);

            // Sending the data to Google Apps Script URL
            fetch('https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec', {
                method: 'POST',
                body: formData,
            })
            .then(response => response.json())
            .then(data => {
                alert('Form submitted successfully!');
                // Optionally reset the form
                document.getElementById('demoForm').reset();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('There was an error submitting the form.');
            });
        }
    </script>
</head>
<body>
    <h1>Demo Launcher Form</h1>
    <form id="demoForm" onsubmit="submitForm(event)">
        <label for="courseName">Course Name:</label>
        <input type="text" id="courseName" name="courseName" required>
        <br><br>
        <label for="learnerEmail">Learner Email:</label>
        <input type="email" id="learnerEmail" name="learnerEmail" required>
        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
