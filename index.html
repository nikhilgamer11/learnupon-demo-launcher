<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO HUB | ARCHITECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #FF4D00; --bg: #0F0F0F; }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .heavy { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; line-height: 0.85; }
        
        /* Massive Typography that scales */
        .giant-text { font-size: clamp(3rem, 12vw, 10rem); color: var(--orange); }
        
        /* The Rose Island Input Style */
        .line-input {
            background: transparent;
            border: none;
            border-bottom: 4px solid white;
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(1.5rem, 5vw, 4rem);
            width: 100%;
            outline: none;
            transition: all 0.4s ease;
            padding: 10px 0;
            color: white;
            text-transform: uppercase;
        }
        .line-input:focus { border-bottom-color: var(--orange); }
        .line-input::placeholder { color: #222; }

        /* Video Background with Rose Island styling */
        .video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; opacity: 0.4; filter: contrast(1.2) brightness(0.8);
        }
        iframe { width: 100vw; height: 100vh; object-fit: cover; transform: scale(1.5); }

        .scanline {
            width: 100%; height: 100%; position: fixed; top: 0; left: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 51%);
            background-size: 100% 4px; z-index: -1; pointer-events: none;
        }

        .section-frame { min-height: 100vh; padding: 4rem; display: flex; flex-direction: column; justify-content: center; }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/2Gg6Seob5Mg?autoplay=1&mute=1&loop=1&playlist=2Gg6Seob5Mg&controls=0&showinfo=0" frameborder="0"></iframe>
    </div>
    <div class="scanline"></div>

    <nav class="fixed top-0 left-0 w-full p-10 flex justify-between items-start z-50">
        <div class="flex flex-col">
            <img src="logo.jpeg" class="h-12 w-auto mb-4 invert brightness-200">
            <span class="text-[10px] tracking-[1em] font-black uppercase text-orange-600">Luminous Demo Hub</span>
        </div>
        <div class="text-right">
            <p class="text-[10px] tracking-widest opacity-50 uppercase">Coordinate: 11.0 KM OFF THE COAST</p>
            <p class="text-[10px] tracking-widest opacity-50 uppercase">Status: READY TO DEPLOY</p>
        </div>
    </nav>

    <form id="architectForm">
        <div class="section-frame">
            <h1 class="giant-text heavy mb-10">THE<br>PORTAL.</h1>
            <div class="max-w-4xl">
                <input type="text" id="subdomain" class="line-input" placeholder="PORTAL-NAME" required>
                <div class="flex justify-between mt-4">
                    <span class="text-xs font-black text-orange-600 uppercase tracking-tighter">01 / SUBDOMAIN ENTRY</span>
                    <span class="text-xs font-black opacity-30 uppercase tracking-tighter">SCROLL TO NEXT</span>
                </div>
            </div>
        </div>

        <div class="section-frame bg-white text-black">
            <h1 class="giant-text heavy mb-10" style="color: black;">THE<br>KEYS.</h1>
            <div class="max-w-4xl space-y-20">
                <input type="text" id="apiKey" class="line-input !border-black !text-black" placeholder="API USERNAME" required>
                <input type="password" id="apiPass" class="line-input !border-black !text-black" placeholder="SECRET PASSWORD" required>
            </div>
        </div>

        <div class="section-frame">
            <h1 class="giant-text heavy mb-10">THE<br>BUILD.</h1>
            <div class="max-w-4xl space-y-12">
                <div>
                    <p class="text-orange-600 font-black text-xs mb-2">ADD COURSE TITLES (COMMA SEPARATED)</p>
                    <input type="text" id="courseList" class="line-input" placeholder="7+ COURSES REQUIRED" required>
                </div>
                <div>
                    <p class="text-orange-600 font-black text-xs mb-2">ADD GROUP TITLES (COMMA SEPARATED)</p>
                    <input type="text" id="groupList" class="line-input" placeholder="3+ GROUPS REQUIRED" required>
                </div>
            </div>
        </div>

        <div class="section-frame bg-orange-600">
            <h1 class="giant-text heavy mb-10" style="color: white;">THE<br>LAUNCH.</h1>
            <div class="max-w-4xl">
                <input type="datetime-local" id="liveDate" class="line-input !border-white mb-10">
                <button type="submit" id="submitBtn" class="bg-black text-white px-10 py-6 font-black text-2xl hover:bg-white hover:text-black transition-all uppercase w-full text-left">
                    Initialize Hub Deployment ↗
                </button>
                <p id="status" class="mt-4 font-black uppercase text-xs tracking-widest text-black"></p>
            </div>
        </div>
    </form>

    <script>
        const GAS_URL = "YOUR_GOOGLE_SCRIPT_URL";

        document.getElementById('architectForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.innerText = "TRANSMITTING DATA...";
            status.innerText = "ARCHITECTING DEMO HUB ON-SITE...";

            const payload = {
                subdomain: document.getElementById('subdomain').value,
                apiKey: document.getElementById('apiKey').value,
                apiPass: document.getElementById('apiPass').value,
                courses: document.getElementById('courseList').value.split(','),
                groups: document.getElementById('groupList').value.split(','),
                liveDate: document.getElementById('liveDate').value
            };

            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                status.innerText = "SUCCESS: MICRONATION ESTABLISHED.";
                btn.innerText = "DEPLOYED";
            } catch (err) {
                status.innerText = "CONNECTION FAILED.";
                btn.innerText = "RETRY LAUNCH";
            }
        };
    </script>
</body>
</html>
