<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Architect | LearnUpon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --accent: #ffffff; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--accent);
            scroll-behavior: smooth;
        }
        h1, h2 { font-family: 'Playfair Display', serif; }

        /* Full-screen sections like Rose Island */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* Minimalist Input - Just a line */
        .editorial-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 1rem 0;
            transition: border-color 0.5s ease;
            outline: none;
        }
        .editorial-input:focus { border-bottom-color: #ffffff; }
        .editorial-input::placeholder { color: rgba(255,255,255,0.1); font-style: italic; }

        /* Video Background Overlay (Subtle) */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.3; filter: grayscale(1);
            object-fit: cover;
        }

        /* Fixed Navigation Info */
        .fixed-nav {
            position: fixed; top: 40px; left: 40px; z-index: 100;
        }
        .fixed-logo {
            position: fixed; top: 40px; right: 40px; z-index: 100;
        }
        .scroll-indicator {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.5;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-slow-motion-of-a-cloudy-sky-during-sunset-14022-large.mp4" type="video/mp4">
    </video>

    <div class="fixed-nav">
        <p class="text-[10px] tracking-[0.5em] uppercase opacity-50">Architect v1.0</p>
    </div>

    <div class="fixed-logo">
        <img src="logo.jpeg" alt="Logo" class="h-10 grayscale invert">
    </div>

    <form id="architectForm">
        <section id="sec-1">
            <h2 class="text-xl italic mb-10 opacity-60">To begin, identify your portal</h2>
            <input type="text" id="subdomain" class="editorial-input" placeholder="subdomain" required>
            <p class="mt-4 text-[10px] tracking-[0.2em] opacity-40">.LEARNUPON.COM</p>
        </section>

        <section id="sec-2">
            <h2 class="text-xl italic mb-10 opacity-60">Credentials for the tunnel</h2>
            <div class="w-full max-w-2xl space-y-20">
                <input type="text" id="apiKey" class="editorial-input" placeholder="api username" required>
                <input type="password" id="apiPass" class="editorial-input" placeholder="api password" required>
            </div>
        </section>

        <section id="sec-3">
            <h2 class="text-xl italic mb-10 opacity-60">Who is entering the sandbox?</h2>
            <div class="w-full max-w-2xl space-y-10">
                <input type="text" id="firstName" class="editorial-input !text-2xl" placeholder="first name">
                <input type="text" id="lastName" class="editorial-input !text-2xl" placeholder="last name">
                <input type="email" id="email" class="editorial-input !text-2xl" placeholder="email address" required>
            </div>
        </section>

        <section id="sec-4">
            <h2 class="text-xl italic mb-10 opacity-60">Define the architecture</h2>
            <div class="w-full max-w-3xl space-y-10">
                <input type="text" id="courseList" class="editorial-input !text-2xl" placeholder="courses, separated by commas">
                <input type="text" id="groupList" class="editorial-input !text-2xl" placeholder="groups, separated by commas">
            </div>
        </section>

        <section id="sec-5">
            <h2 class="text-5xl mb-10">Ready to build?</h2>
            <input type="datetime-local" id="liveDate" class="editorial-input !text-xl mb-10 border-none">
            <button type="submit" id="submitBtn" class="px-12 py-4 border border-white text-xs tracking-[0.5em] uppercase hover:bg-white hover:text-black transition-all duration-700">
                Initialize Deployment
            </button>
            <p id="status" class="mt-10 text-[10px] tracking-widest opacity-0 transition-opacity duration-1000"></p>
        </section>
    </form>

    <div class="scroll-indicator animate-bounce">Scroll to navigate</div>

    <script>
        const GAS_URL = "YOUR_GOOGLE_SCRIPT_URL";

        document.getElementById('architectForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.innerText = "BUILDING...";
            status.style.opacity = "1";
            status.innerText = "Connecting to LearnUpon API...";

            const payload = {
                apiKey: document.getElementById('apiKey').value,
                apiPass: document.getElementById('apiPass').value,
                subdomain: document.getElementById('subdomain').value,
                email: document.getElementById('email').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                courses: document.getElementById('courseList').value.split(',').map(s => s.trim()),
                groups: document.getElementById('groupList').value.split(',').map(s => s.trim()),
                liveDate: document.getElementById('liveDate').value
            };

            try {
                // Using 'no-cors' mode for Google Apps Script triggers
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                status.innerText = "PORTAL CONSTRUCTED. CHECK YOUR EMAIL.";
                btn.innerText = "SUCCESS";
            } catch (err) {
                status.innerText = "CONNECTION INTERRUPTED.";
                btn.innerText = "RETRY";
            }
        };
    </script>
</body>
</html>
