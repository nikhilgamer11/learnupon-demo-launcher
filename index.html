<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox Architect | LearnUpon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background: #000; margin: 0; }
        
        /* YouTube Background Container */
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; overflow: hidden;
        }
        .video-foreground, .video-background iframe {
            position: absolute; top: 50%; left: 50%; width: 100vw; height: 56.25vw; /* 16:9 Ratio */
            min-height: 100vh; min-width: 177.77vh; transform: translate(-50%, -50%);
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Darkens the video for readability */
            z-index: 0;
        }

        /* Card Logic */
        .step-card {
            display: none; position: relative; z-index: 10;
            backdrop-filter: blur(25px);
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .step-card.active { display: block; animation: cardEntrance 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        
        .nav-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); z-index: 20; }
        .nav-btn:hover { background: #3b82f6; color: white; transform: scale(1.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

    <div class="video-background text-center">
        <div class="video-foreground">
            <iframe src="https://www.youtube.com/embed/2Gg6Seob5Mg?controls=0&showinfo=0&rel=0&autoplay=1&loop=1&playlist=2Gg6Seob5Mg&mute=1" 
                    frameborder="0" allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>
    <div class="overlay"></div>

    <button onclick="prevStep()" class="nav-btn fixed left-6 md:left-12 p-4 rounded-full transition-all hidden" id="prevBtn">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
    </button>
    <button onclick="nextStep()" class="nav-btn fixed right-6 md:right-12 p-4 rounded-full transition-all" id="nextBtn">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
    </button>

    <div class="max-w-2xl w-full px-6 relative z-10">
        <div class="text-center mb-8">
            <img src="logo.jpeg" alt="Logo" class="h-16 mx-auto mb-4 rounded-lg shadow-lg">
            <div class="text-xs tracking-[0.4em] uppercase text-blue-400 font-extrabold">Sandbox Architect</div>
        </div>

        <form id="architectForm">
            <div class="step-card active p-10 rounded-[2rem]" id="step1">
                <h2 class="text-3xl font-extrabold mb-1">Connect Portal</h2>
                <p class="text-gray-400 mb-8 text-sm italic">Accessing LearnUpon API Gateway...</p>
                <div class="space-y-4">
                    <input type="text" id="apiKey" placeholder="API Key" class="w-full p-4 rounded-xl outline-none" required>
                    <input type="password" id="apiPass" placeholder="API Password" class="w-full p-4 rounded-xl outline-none" required>
                    <div class="flex">
                        <input type="text" id="subdomain" placeholder="portal-subdomain" class="w-full p-4 rounded-l-xl outline-none" required>
                        <span class="bg-blue-600/40 p-4 rounded-r-xl border border-l-0 border-white/20 text-xs flex items-center">.learnupon.com</span>
                    </div>
                </div>
            </div>

            <div class="step-card p-10 rounded-[2rem]" id="step2">
                <h2 class="text-3xl font-extrabold mb-1">Learner Setup</h2>
                <p class="text-gray-400 mb-8 text-sm italic">Whom are we training today?</p>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="firstName" placeholder="First Name" class="w-full p-4 rounded-xl outline-none">
                        <input type="text" id="lastName" placeholder="Last Name" class="w-full p-4 rounded-xl outline-none">
                    </div>
                    <input type="email" id="email" placeholder="Prospect Email" class="w-full p-4 rounded-xl outline-none" required>
                </div>
            </div>

            <div class="step-card p-10 rounded-[2rem]" id="step3">
                <h2 class="text-3xl font-extrabold mb-1">Bulk Content</h2>
                <p class="text-gray-400 mb-8 text-sm italic">Comma separated lists only.</p>
                <div class="space-y-4">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Course Names</label>
                    <textarea id="courseList" rows="2" placeholder="Sales 101, Product Alpha..." class="w-full p-4 rounded-xl outline-none resize-none"></textarea>
                    
                    <label class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Group Names</label>
                    <textarea id="groupList" rows="2" placeholder="Retailers, Internal Team..." class="w-full p-4 rounded-xl outline-none resize-none"></textarea>
                </div>
            </div>

            <div class="step-card p-10 rounded-[2rem]" id="step4">
                <h2 class="text-3xl font-extrabold mb-1">Live Event</h2>
                <p class="text-gray-400 mb-8 text-sm italic">Finalize deployment window.</p>
                <div class="space-y-6">
                    <input type="datetime-local" id="liveDate" class="w-full p-4 rounded-xl outline-none">
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-2xl shadow-[0_0_40px_rgba(59,130,246,0.5)] transition-all uppercase tracking-widest">
                        Launch Sandbox
                    </button>
                </div>
            </div>
        </form>

        <div id="status" class="mt-8 text-center text-sm font-bold tracking-widest opacity-0 transition-all"></div>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 4;
        const GAS_URL = "YOUR_GOOGLE_SCRIPT_URL";

        function updateDisplay() {
            document.querySelectorAll('.step-card').forEach((card, index) => {
                card.classList.toggle('active', index + 1 === currentStep);
            });
            document.getElementById('prevBtn').classList.toggle('hidden', currentStep === 1);
            document.getElementById('nextBtn').classList.toggle('hidden', currentStep === totalSteps);
        }

        function nextStep() { if (currentStep < totalSteps) { currentStep++; updateDisplay(); } }
        function prevStep() { if (currentStep > 1) { currentStep--; updateDisplay(); } }

        // Form Submit remains the same logic as previous steps
        document.getElementById('architectForm').onsubmit = async (e) => {
            e.preventDefault();
            // ... (Insert Fetch Logic from Step 5) ...
        };
    </script>
</body>
</html>
