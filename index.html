<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALACTIC ARCHITECT | MISSION CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #FF4D00; --glow: rgba(255, 77, 0, 0.8); }
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .heavy { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; line-height: 0.9; }

        /* HUD & Progress Tracking */
        #progressBar { position: fixed; top: 0; left: 0; height: 6px; background: var(--orange); box-shadow: 0 0 25px var(--orange); z-index: 100; transition: width 0.3s; width: 0%; }
        #missionClock { position: fixed; top: 2rem; right: 2rem; z-index: 60; font-family: 'Archivo Black'; font-size: 2rem; color: var(--orange); text-shadow: 0 0 15px var(--glow); }

        /* Background Rocket Video (Ambient Mode) */
        .ambient-video-wrapper { position: fixed; inset: 0; z-index: -2; opacity: 0.3; filter: saturate(0.5) brightness(0.6); pointer-events: none; }
        #ambientPlayer { width: 100%; height: 100%; transform: scale(1.5); }

        .section-frame { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; position: relative; }

        /* Orange Calendar Icon Styling */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(48%) sepia(85%) saturate(2478%) hue-rotate(346deg) brightness(101%) contrast(101%);
            cursor: pointer; font-size: 1.8rem;
        }

        /* Black/Orange Input Theme */
        .line-input {
            background: transparent; border: none; border-bottom: 3px solid rgba(255, 255, 255, 0.2);
            font-family: 'Archivo Black', sans-serif; font-size: clamp(1.5rem, 5vw, 4rem);
            width: 80%; text-align: center; outline: none; transition: 0.5s;
            text-transform: uppercase; color: white;
        }
        .line-input:focus { border-bottom-color: var(--orange); filter: drop-shadow(0 0 20px var(--glow)); transform: translateY(-5px); }

        /* Full Screen Launch Overlay */
        #launchOverlay { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #launchPlayer { position: absolute; inset: 0; z-index: 10; }
        #countdownContainer { position: relative; z-index: 20; text-align: center; }
        
        .btn-launch {
            background: var(--orange); padding: 2rem 5rem; font-family: 'Archivo Black'; font-size: 2rem;
            box-shadow: 0 0 40px var(--glow); transition: 0.4s; color: white; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="progressBar"></div>
    <div id="missionClock">T-MINUS: 5</div>

    <div class="ambient-video-wrapper">
        <div id="ambientPlayer"></div>
    </div>

    <form id="architectForm">
        <section class="section-frame" data-step="5">
            <h1 class="heavy text-orange-600 text-xs tracking-[0.8em] mb-4">Target Subdomain</h1>
            <input type="text" id="subdomain" class="line-input" placeholder="PORTAL_ID" required>
        </section>

        <section class="section-frame bg-black/80 backdrop-blur-xl border-y border-orange-600/10" data-step="4">
            <h1 class="heavy text-orange-600 text-xs tracking-[0.8em] mb-16">Security Clearance</h1>
            <div class="w-full flex flex-col items-center gap-12">
                <input type="text" class="line-input !text-2xl" placeholder="API USERNAME" required>
                <input type="password" class="line-input !text-2xl" placeholder="API PASSWORD" required>
            </div>
        </section>

        <section class="section-frame" data-step="3">
            <h1 class="heavy text-orange-600 text-xs tracking-[0.8em] mb-4">Course Manifest</h1>
            <input type="text" class="line-input" placeholder="COMMA_SEPARATED_LIST" required>
        </section>

        <section class="section-frame bg-black/80 backdrop-blur-xl border-y border-orange-600/10" data-step="2">
            <h1 class="heavy text-orange-600 text-xs tracking-[0.8em] mb-4">Group Architecture</h1>
            <input type="text" class="line-input" placeholder="GROUPS_COMMA_SEPARATED" required>
        </section>

        <section class="section-frame bg-gradient-to-t from-orange-950/60 to-black" data-step="1">
            <h1 class="heavy text-white text-6xl italic mb-12 tracking-tighter">Final Ignition.</h1>
            <input type="datetime-local" class="line-input !text-3xl mb-16" required>
            <button type="submit" class="btn-launch heavy">INITIATE LAUNCH</button>
        </section>
    </form>

    <div id="launchOverlay">
        <div id="launchPlayer"></div>
        <div id="countdownContainer">
            <h1 id="cdText" class="heavy text-white text-[20vw] italic drop-shadow-[0_0_50px_var(--orange)]">5</h1>
            <p class="heavy text-orange-600 tracking-[1em]">POWERING PROPULSION</p>
        </div>
        <div id="successMsg" class="hidden absolute z-30 text-center">
            <h1 class="heavy text-white text-7xl">ORBIT ACHIEVED</h1>
            <button onclick="location.reload()" class="mt-8 border border-white/30 heavy px-8 py-4 text-xs hover:bg-white hover:text-black">REBOOT SYSTEM</button>
        </div>
    </div>

    <script>
        // Load YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var ambientPlayer, launchPlayer;

        function onYouTubeIframeAPIReady() {
            // Ambient Background Video (Loops 0:17 to 0:33 quietly)
            ambientPlayer = new YT.Player('ambientPlayer', {
                height: '100%', width: '100%', videoId: 'C3iHAgwIYtI',
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'start': 17, 'end': 33, 'playlist': 'C3iHAgwIYtI' }
            });

            // Dramatic Launch Video
            launchPlayer = new YT.Player('launchPlayer', {
                height: '100%', width: '100%', videoId: 'C3iHAgwIYtI',
                playerVars: { 'autoplay': 0, 'controls': 0, 'mute': 0, 'start': 17, 'end': 33 }
            });
        }

        // Scroll Logic
        window.onscroll = () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progressBar").style.width = (winScroll / height * 100) + "%";

            document.querySelectorAll('section').forEach(sec => {
                const rect = sec.getBoundingClientRect();
                if(rect.top >= -100 && rect.top <= window.innerHeight/2) {
                    document.getElementById('missionClock').innerText = `T-MINUS: ${sec.dataset.step}`;
                }
            });
        };

        // Submit Logic
        document.getElementById('architectForm').onsubmit = (e) => {
            e.preventDefault();
            const overlay = document.getElementById('launchOverlay');
            const cdText = document.getElementById('cdText');
            const success = document.getElementById('successMsg');
            
            overlay.style.display = 'flex';
            launchPlayer.seekTo(17);
            launchPlayer.playVideo();

            let count = 5;
            const timer = setInterval(() => {
                count--;
                cdText.innerText = count;
                if(count <= 0) {
                    clearInterval(timer);
                    document.getElementById('countdownContainer').style.display = 'none';
                    success.classList.remove('hidden');
                }
            }, 1000);
        };
    </script>
</body>
</html>
